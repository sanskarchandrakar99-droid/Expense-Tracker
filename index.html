
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpend AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--accent:#38bdf8;
--glass:rgba(255,255,255,0.06);
--bg:#0f172a;
--card:#1e293b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
padding:40px;
}

h1{
color:var(--accent);
margin-bottom:10px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
gap:25px;
margin-top:30px;
}

.card{
background:var(--glass);
backdrop-filter:blur(20px);
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input,select{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:12px;
border:none;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:var(--accent);
font-weight:bold;
cursor:pointer;
}

ul{
list-style:none;
max-height:200px;
overflow:auto;
}

li{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

canvas{
margin-top:15px;
}
</style>
</head>

<body>

<h1>SmartSpend AI Dashboard</h1>
<p>Predict • Optimize • Simplify</p>

<div class="container">

<div class="card">
<h2>Add Expense</h2>
<input id="desc" placeholder="Description">
<input id="amount" type="number" placeholder="Amount ₹">
<select id="category">
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Entertainment</option>
<option>Other</option>
</select>
<button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<h2>Set Monthly Budget</h2>
<input id="budgetInput" type="number" placeholder="Enter Budget ₹">
<button onclick="setBudget()">Save Budget</button>
<p>Budget: ₹<span id="budget">0</span></p>
</div>

<div class="card">
<h2>Financial Intelligence</h2>
<p>Total Spend: ₹<span id="total">0</span></p>
<p>Burn Rate: ₹<span id="burn">0</span>/day</p>
<p>Exhaustion Date: <span id="exhaust">-</span></p>
</div>

<div class="card">
<h2>Expense History</h2>
<ul id="list"></ul>
</div>

<div class="card">
<h2>Spending Trend</h2>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h2>Category Breakdown</h2>
<canvas id="pieChart"></canvas>
</div>

<div class="card">
<h2>Debt Simplifier</h2>
<input id="from" placeholder="From">
<input id="to" placeholder="To">
<input id="debtAmt" type="number" placeholder="Amount ₹">
<button onclick="addDebt()">Add Debt</button>
<ul id="debtList"></ul>
<button onclick="simplify()">Simplify Debts</button>
<p id="result"></p>
</div>

</div>

<script>

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let budget = parseFloat(localStorage.getItem("budget")) || 0;
let debts = [];

document.getElementById("budget").innerText = budget;

function save(){
localStorage.setItem("expenses",JSON.stringify(expenses));
localStorage.setItem("budget",budget);
}

function addExpense(){
const desc=document.getElementById("desc").value;
const amount=parseFloat(document.getElementById("amount").value);
const category=document.getElementById("category").value;

if(!desc || isNaN(amount)) return alert("Enter valid expense");

expenses.push({desc,amount,category,date:new Date()});
save();
render();
}

function setBudget(){
budget=parseFloat(document.getElementById("budgetInput").value);
if(isNaN(budget)) return alert("Enter valid budget");
save();
render();
}

function render(){

let total=expenses.reduce((a,b)=>a+b.amount,0);
document.getElementById("total").innerText=total.toFixed(2);
document.getElementById("budget").innerText=budget;

let last7=expenses.slice(-7);
let weighted=0, weightSum=0;

last7.forEach((e,i)=>{
let weight=i+1;
weighted+=e.amount*weight;
weightSum+=weight;
});

let burn=weightSum? weighted/weightSum:0;
document.getElementById("burn").innerText=burn.toFixed(2);

if(budget>0 && burn>0){
let remaining=budget-total;
let daysLeft=Math.floor(remaining/burn);
let date=new Date();
date.setDate(date.getDate()+daysLeft);
document.getElementById("exhaust").innerText=
remaining>0?date.toDateString():"Budget Exhausted";
}

let list=document.getElementById("list");
list.innerHTML="";
expenses.forEach(e=>{
let li=document.createElement("li");
li.innerHTML=`${e.desc} - ₹${e.amount} (${e.category})`;
list.appendChild(li);
});

updateCharts();
}

let lineChart,pieChart;

function updateCharts(){

if(lineChart) lineChart.destroy();
if(pieChart) pieChart.destroy();

const ctx1=document.getElementById("lineChart");
const ctx2=document.getElementById("pieChart");

lineChart=new Chart(ctx1,{
type:"line",
data:{
labels:expenses.map(e=>new Date(e.date).toLocaleDateString()),
datasets:[{
label:"Spending",
data:expenses.map(e=>e.amount),
borderColor:"#38bdf8",
tension:0.4
}]
}
});

let categoryData={};
expenses.forEach(e=>{
categoryData[e.category]=(categoryData[e.category]||0)+e.amount;
});

pieChart=new Chart(ctx2,{
type:"doughnut",
data:{
labels:Object.keys(categoryData),
datasets:[{data:Object.values(categoryData)}]
}
});
}

function addDebt(){
let f=document.getElementById("from").value;
let t=document.getElementById("to").value;
let a=parseFloat(document.getElementById("debtAmt").value);

if(!f||!t||isNaN(a)) return;

debts.push({f,t,a});
renderDebts();
}

function renderDebts(){
let list=document.getElementById("debtList");
list.innerHTML="";
debts.forEach(d=>{
let li=document.createElement("li");
li.innerText=`${d.f} → ${d.t} ₹${d.a}`;
list.appendChild(li);
});
}

function simplify(){
let balance={};

debts.forEach(d=>{
balance[d.f]=(balance[d.f]||0)-d.a;
balance[d.t]=(balance[d.t]||0)+d.a;
});

let creditors=[],debtors=[];
for(let p in balance){
if(balance[p]>0) creditors.push({p,amt:balance[p]});
if(balance[p]<0) debtors.push({p,amt:-balance[p]});
}

let output="";
debtors.forEach(d=>{
creditors.forEach(c=>{
let settle=Math.min(d.amt,c.amt);
if(settle>0){
output+=`${d.p} → ${c.p} ₹${settle}<br>`;
d.amt-=settle;
c.amt-=settle;
}
});
});

document.getElementById("result").innerHTML=output||"No debts";
}

render();

</script>

</body>
</html>
