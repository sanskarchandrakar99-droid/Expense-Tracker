<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpend AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#38bdf8;
--green:#22c55e;
--red:#ef4444;
--glass:rgba(255,255,255,0.05);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter, sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
padding:30px;
}

h1{
font-size:32px;
color:var(--accent);
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:var(--glass);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:var(--accent);
color:black;
font-weight:bold;
cursor:pointer;
}

.kpi{
font-size:22px;
margin:10px 0;
}

.green{color:var(--green);}
.red{color:var(--red);}

ul{
list-style:none;
max-height:200px;
overflow:auto;
}

li{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

canvas{
margin-top:15px;
}

</style>
</head>
<body>

<h1>SmartSpend AI Dashboard</h1>
<p>Predict. Optimize. Simplify.</p>

<div class="container">

<div class="card">
<h2>Add Expense</h2>
<input id="desc" placeholder="Description">
<input id="amount" type="number" placeholder="Amount ₹">
<select id="category">
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Entertainment</option>
<option>Other</option>
</select>
<button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<h2>Set Monthly Budget</h2>
<input id="budgetInput" type="number" placeholder="Enter Budget ₹">
<button onclick="setBudget()">Save Budget</button>
<p class="kpi">Budget: ₹<span id="budget">0</span></p>
</div>

<div class="card">
<h2>Financial Intelligence</h2>
<p class="kpi">Total Spend: ₹<span id="total">0</span></p>
<p class="kpi">Burn Rate: ₹<span id="burn">0</span>/day</p>
<p class="kpi">Exhaustion Date: <span id="exhaust"></span></p>
</div>

<div class="card">
<h2>Expense History</h2>
<ul id="list"></ul>
</div>

<div class="card">
<h2>Spending Trend</h2>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h2>Category Breakdown</h2>
<canvas id="pieChart"></canvas>
</div>

<div class="card">
<h2>Debt Simplifier</h2>
<input id="from" placeholder="From">
<input id="to" placeholder="To">
<input id="debtAmt" type="number" placeholder="Amount ₹">
<button onclick="addDebt()">Add Debt</button>
<ul id="debtList"></ul>
<button onclick="simplify()">Simplify Debts</button>
<p id="result"></p>
</div>

</div>

<script>

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];
let budget = localStorage.getItem("budget") || 0;
let debts = [];

document.getElementById("budget").innerText = budget;

function save(){
localStorage.setItem("expenses",JSON.stringify(expenses));
localStorage.setItem("budget",budget);
}

function addExpense(){
let desc = descInput.value;
let amount = parseFloat(amountInput.value);
let category = categoryInput.value;

if(!desc || !amount) return;

expenses.push({
desc,amount,category,
date:new Date()
});

save();
render();
}

function setBudget(){
budget = budgetInput.value;
save();
document.getElementById("budget").innerText = budget;
render();
}

function render(){

let total = expenses.reduce((a,b)=>a+b.amount,0);
totalSpan.innerText = total;

let today = new Date().getDate();
let last7 = expenses.slice(-7);
let weighted = 0;
let weightSum = 0;

last7.forEach((e,i)=>{
let weight = i+1;
weighted += e.amount * weight;
weightSum += weight;
});

let burn = weighted/weightSum || 0;
burnSpan.innerText = burn.toFixed(2);

if(budget>0){
let remaining = budget-total;
let daysLeft = Math.floor(remaining/burn);
let date = new Date();
date.setDate(date.getDate()+daysLeft);
exhaustSpan.innerText = daysLeft>0?date.toDateString():"Budget Exhausted";
}

list.innerHTML="";
expenses.forEach(e=>{
let li=document.createElement("li");
li.innerHTML=`${e.desc} - ₹${e.amount} (${e.category})`;
list.appendChild(li);
});

updateCharts();
}

let lineChart,pieChart;

function updateCharts(){

let ctx1=document.getElementById("lineChart");
let ctx2=document.getElementById("pieChart");

if(lineChart) lineChart.destroy();
if(pieChart) pieChart.destroy();

lineChart=new Chart(ctx1,{
type:"line",
data:{
labels:expenses.map(e=>new Date(e.date).toLocaleDateString()),
datasets:[{label:"Spending",data:expenses.map(e=>e.amount)}]
}
});

let categoryData={};
expenses.forEach(e=>{
categoryData[e.category]=(categoryData[e.category]||0)+e.amount;
});

pieChart=new Chart(ctx2,{
type:"doughnut",
data:{
labels:Object.keys(categoryData),
datasets:[{data:Object.values(categoryData)}]
}
});
}

function addDebt(){
let f=from.value;
let t=to.value;
let a=parseFloat(debtAmt.value);
debts.push({f,t,a});
renderDebts();
}

function renderDebts(){
debtList.innerHTML="";
debts.forEach(d=>{
let li=document.createElement("li");
li.innerText=`${d.f} → ${d.t} ₹${d.a}`;
debtList.appendChild(li);
});
}

function simplify(){
let balance={};

debts.forEach(d=>{
balance[d.f]=(balance[d.f]||0)-d.a;
balance[d.t]=(balance[d.t]||0)+d.a;
});

let creditors=[],debtors=[];
for(let p in balance){
if(balance[p]>0) creditors.push({p,amt:balance[p]});
if(balance[p]<0) debtors.push({p,amt:-balance[p]});
}

let output="";
debtors.forEach(d=>{
creditors.forEach(c=>{
let settle=Math.min(d.amt,c.amt);
if(settle>0){
output+=`${d.p} → ${c.p} ₹${settle}<br>`;
d.amt-=settle;
c.amt-=settle;
}
});
});

result.innerHTML=output;
}

render();

</script>

</body>
</html>
