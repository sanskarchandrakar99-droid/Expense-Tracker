
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartSpend PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--accent:#38bdf8;
--danger:#ef4444;
--success:#22c55e;
--glass:rgba(255,255,255,0.07);
}

body{
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
font-family:Inter,sans-serif;
padding:30px;
}

h1{color:var(--accent);}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:var(--glass);
backdrop-filter:blur(15px);
padding:20px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:none;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:var(--accent);
font-weight:bold;
cursor:pointer;
}

.metric{margin:6px 0;}
.green{color:var(--success);}
.red{color:var(--danger);}

ul{list-style:none;max-height:200px;overflow:auto;}
li{padding:6px;border-bottom:1px solid rgba(255,255,255,0.1);}

.ai-box{
background:#0f172a;
padding:10px;
border-radius:10px;
margin-top:10px;
font-size:14px;
}
</style>
</head>

<body>

<h1>SmartSpend PRO</h1>
<p>AI-Powered Financial Intelligence</p>

<div class="container">

<div class="card">
<h3>Add Expense</h3>
<input id="desc" placeholder="Description">
<input id="amount" type="number" placeholder="Amount ₹">
<select id="category">
<option>Food</option>
<option>Transport</option>
<option>Shopping</option>
<option>Entertainment</option>
<option>Other</option>
</select>
<button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
<h3>Budget & Goal</h3>
<input id="budgetInput" type="number" placeholder="Monthly Budget ₹">
<button onclick="setBudget()">Save Budget</button>
<input id="goalInput" type="number" placeholder="Savings Goal ₹">
<button onclick="setGoal()">Set Goal</button>
<p class="metric">Budget: ₹<span id="budget">0</span></p>
<p class="metric">Goal: ₹<span id="goal">0</span></p>
</div>

<div class="card">
<h3>Financial Intelligence</h3>
<p>Total Spend: ₹<span id="total">0</span></p>
<p>Burn Rate: ₹<span id="burn">0</span>/day</p>
<p>Exhaustion Date: <span id="exhaust">-</span></p>
<p>Risk Level: <span id="risk"></span></p>
<p>Financial Score: <span id="score"></span></p>
<div class="ai-box" id="aiInsights"></div>
</div>

<div class="card">
<h3>Expense History</h3>
<ul id="list"></ul>
</div>

<div class="card">
<h3>Spending Trend</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>Category Breakdown</h3>
<canvas id="pieChart"></canvas>
</div>

</div>

<script>

let expenses=JSON.parse(localStorage.getItem("expenses"))||[];
let budget=parseFloat(localStorage.getItem("budget"))||0;
let goal=parseFloat(localStorage.getItem("goal"))||0;

document.getElementById("budget").innerText=budget;
document.getElementById("goal").innerText=goal;

function save(){
localStorage.setItem("expenses",JSON.stringify(expenses));
localStorage.setItem("budget",budget);
localStorage.setItem("goal",goal);
}

function addExpense(){
let desc=document.getElementById("desc").value;
let amount=parseFloat(document.getElementById("amount").value);
let category=document.getElementById("category").value;

if(!desc||isNaN(amount))return alert("Enter valid expense");

let avg=getCategoryAverage(category);
if(avg && amount>avg*2.5){
alert("⚠ Anomaly Detected! This is unusually high for "+category);
}

expenses.push({desc,amount,category,date:new Date()});
save();
render();
}

function setBudget(){
budget=parseFloat(document.getElementById("budgetInput").value);
save();
render();
}

function setGoal(){
goal=parseFloat(document.getElementById("goalInput").value);
save();
render();
}

function getCategoryAverage(category){
let cat=expenses.filter(e=>e.category===category);
if(cat.length===0)return 0;
return cat.reduce((a,b)=>a+b.amount,0)/cat.length;
}

function calculateBurn(){
let last7=expenses.slice(-7);
let weighted=0,weightSum=0;
last7.forEach((e,i)=>{
let w=i+1;
weighted+=e.amount*w;
weightSum+=w;
});
return weightSum?weighted/weightSum:0;
}

function render(){

let total=expenses.reduce((a,b)=>a+b.amount,0);
document.getElementById("total").innerText=total.toFixed(2);
document.getElementById("budget").innerText=budget;
document.getElementById("goal").innerText=goal;

let burn=calculateBurn();
document.getElementById("burn").innerText=burn.toFixed(2);

if(budget>0 && burn>0){
let remaining=budget-total;
let daysLeft=Math.floor(remaining/burn);
let date=new Date();
date.setDate(date.getDate()+daysLeft);
document.getElementById("exhaust").innerText=
remaining>0?date.toDateString():"Budget Exhausted";
}

let risk="";
if(burn>budget/10) risk="High 🔴";
else if(burn>budget/20) risk="Moderate 🟡";
else risk="Low 🟢";
document.getElementById("risk").innerText=risk;

let overspendPercent=budget?((total-budget)/budget)*100:0;
let score=100-Math.max(0,overspendPercent*2);
score=Math.max(0,Math.min(100,score));
document.getElementById("score").innerText=score.toFixed(0)+"/100";

generateAIInsights(total,burn,score);

renderList();
updateCharts();
}

function generateAIInsights(total,burn,score){
let insight="";

if(score>80) insight="✅ Excellent financial control!";
else if(score>50) insight="⚠ Watch your spending habits.";
else insight="🚨 High financial risk detected.";

let categories={};
expenses.forEach(e=>{
categories[e.category]=(categories[e.category]||0)+e.amount;
});

let top=Object.keys(categories).sort((a,b)=>categories[b]-categories[a])[0];
if(top){
insight+=" Top expense category: "+top+
". Consider reducing it by 15% to save ₹"+
(Math.round(categories[top]*0.15));
}

if(goal>0){
let saved=budget-total;
let months=Math.ceil((goal)/(saved>0?saved:1));
insight+=" At current pace, goal achievable in "+months+" months.";
}

document.getElementById("aiInsights").innerText=insight;
}

function renderList(){
let list=document.getElementById("list");
list.innerHTML="";
expenses.forEach(e=>{
let li=document.createElement("li");
li.innerText=`${e.desc} - ₹${e.amount} (${e.category})`;
list.appendChild(li);
});
}

let lineChart,pieChart;

function updateCharts(){

if(lineChart) lineChart.destroy();
if(pieChart) pieChart.destroy();

lineChart=new Chart(document.getElementById("lineChart"),{
type:"line",
data:{
labels:expenses.map(e=>new Date(e.date).toLocaleDateString()),
datasets:[{
label:"Spending",
data:expenses.map(e=>e.amount),
borderColor:"#38bdf8",
tension:0.4
}]
}
});

let categories={};
expenses.forEach(e=>{
categories[e.category]=(categories[e.category]||0)+e.amount;
});

pieChart=new Chart(document.getElementById("pieChart"),{
type:"doughnut",
data:{
labels:Object.keys(categories),
datasets:[{data:Object.values(categories)}]
}
});
}

render();
</script>

</body>
</html>
